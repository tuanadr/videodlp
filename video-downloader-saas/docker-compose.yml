version: '3.8'

services:
  # SQLite service (file-based database)
  sqlite:
    image: alpine:latest
    container_name: sqlite
    restart: always
    volumes:
      - sqlite_data:/data
    command: sh -c "mkdir -p /data && touch /data/videodlp.db && tail -f /dev/null"
    networks:
      - app-network

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME:-videodlp}/video-downloader-backend:${TAG:-latest}
    container_name: backend
    restart: always
    depends_on:
      - redis
      - sqlite
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - USE_SQLITE=true
      - SQLITE_PATH=/app/database/videodlp.db
      - SQLITE_PRAGMA_JOURNAL_MODE=WAL
      - SQLITE_PRAGMA_SYNCHRONOUS=NORMAL
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - JWT_EXPIRE=${JWT_EXPIRE:-24h}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-changeme}
      - REFRESH_TOKEN_EXPIRE=${REFRESH_TOKEN_EXPIRE:-7d}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - UV_THREADPOOL_SIZE=4
    volumes:
      - backend_downloads:/app/downloads
      - backend_logs:/app/logs
      - sqlite_data:/app/database
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health.txt"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${BACKEND_URL:-http://localhost:5000}
    image: ${DOCKER_HUB_USERNAME:-videodlp}/video-downloader-frontend:${TAG:-latest}
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health.txt"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx service
  nginx:
    image: nginx:1.23-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/www:/var/www/html
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health.txt"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  sqlite_data:
  redis_data:
  backend_downloads:
  backend_logs: